name: mnemosyne
version: 3.0.0
description: "Native local memory for Hermes — SQLite with vector search, FTS5 hybrid ranking, episodic consolidation, and temporal triples. Zero cloud. Zero latency. Deployed via plugin system."
author: Abdias J
provides_tools:
  - mnemosyne_remember
  - mnemosyne_recall
  - mnemosyne_stats
  - mnemosyne_triple_add
  - mnemosyne_triple_query
  - mnemosyne_sleep
  - mnemosyne_scratchpad_write
  - mnemosyne_scratchpad_read
  - mnemosyne_scratchpad_clear
  - mnemosyne_invalidate
  - mnemosyne_export
  - mnemosyne_import
  - mnemosyne_update
  - mnemosyne_forget
  - mnemosyne_diagnose
  - mnemosyne_graph_query
  - mnemosyne_graph_link
provides_hooks:
  - pre_llm_call
  - on_session_start
  - post_tool_call
dependencies: []
